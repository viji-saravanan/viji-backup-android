name: Android source verification

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "feature/**"
      - "review/**"
      - dev

permissions:
  contents: read

concurrency:
  group: android-source-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Unit, build, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install pinned Android SDK packages
        run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "platform-tools"
          "platforms;android-36.1"
          "build-tools;36.1.0"

      - name: Verify both distribution flavors without private configuration
        run: >-
          ./gradlew
          :app:testInternalDebugUnitTest
          :app:testPublicDebugUnitTest
          :app:assembleInternalDebug
          :app:assemblePublicDebug
          :app:assembleInternalDebugAndroidTest
          :app:assemblePublicDebugAndroidTest
          :app:lintInternalDebug
          :app:lintPublicDebug
          --no-daemon
          --stacktrace
